{% extends 'base.html' %}

{% block title %}AI Chatbot{% endblock %}

{% block content %}
<h2>Healthcare AI Chatbot</h2>
<div id="chat-window" class="chat-window">
    <div class="chat-message chat-ai">
        <div class="chat-bubble">
            <strong>AI:</strong> Hello! I can help with symptom guidance, doctor recommendations, and appointment steps.
        </div>
    </div>
</div>
<form id="chat-form" method="post">
    {% csrf_token %}
    <div class="input-group mt-3">
        <input type="text" id="message-input" class="form-control" placeholder="Type your message..." required>
        <button type="submit" class="btn btn-primary">Send</button>
    </div>
</form>
<a href="{% url 'chat_history' %}" class="btn btn-secondary mt-3">View Chat History</a>
{% endblock %}

{% block extra_js %}
<script>
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

const chatForm = document.getElementById('chat-form');
const chatWindow = document.getElementById('chat-window');
const messageInput = document.getElementById('message-input');
const sendButton = chatForm.querySelector('button[type="submit"]');

chatForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const message = messageInput.value.trim();
    if (!message) {
        return;
    }

    sendButton.disabled = true;
    const userMessage = '<div class="chat-message chat-user"><div class="chat-bubble"><strong>You:</strong> ' + escapeHtml(message) + '</div></div>';
    chatWindow.innerHTML += userMessage;
    chatWindow.scrollTop = chatWindow.scrollHeight;

    fetch('{% url "chatbot" %}', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        },
        body: 'message=' + encodeURIComponent(message)
    })
    .then(response => response.json())
    .then(data => {
        const aiMessage = '<div class="chat-message chat-ai"><div class="chat-bubble"><strong>AI:</strong> ' + escapeHtml(data.response) + '</div></div>';
        chatWindow.innerHTML += aiMessage;
        chatWindow.scrollTop = chatWindow.scrollHeight;
        messageInput.value = '';
        messageInput.focus();
    })
    .catch(() => {
        const errorMessage = '<div class="chat-message chat-ai"><div class="chat-bubble"><strong>AI:</strong> Sorry, I could not process your request right now.</div></div>';
        chatWindow.innerHTML += errorMessage;
        chatWindow.scrollTop = chatWindow.scrollHeight;
    })
    .finally(() => {
        sendButton.disabled = false;
    });
});
</script>
{% endblock %}
