{% extends 'base.html' %}

{% block title %}Chat History{% endblock %}

{% block content %}
<h2>Chat History</h2>
<div class="list-group">
    {% for chat in chats %}
    <div class="list-group-item">
        <h5 class="mb-1">{{ chat.timestamp }}</h5>
        <p class="mb-1"><strong>You:</strong> {{ chat.message }}</p>
        <p class="mb-1"><strong>AI:</strong> {{ chat.response }}</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
